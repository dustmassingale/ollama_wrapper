version: '3.8'

services:
  # Ollama Wrapper Gateway
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama-wrapper-gateway
    ports:
      - "8000:8000"
    environment:
      - REMOTE_OLLAMA_URL=http://192.168.1.155:11434
      - LOCAL_OLLAMA_URL=http://localhost:11434
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8000
      - CACHE_TIMEOUT=300
      - REQUEST_TIMEOUT=300
      - REMOTE_MODEL_PREFIX=155-
      - LOCAL_MODEL_PREFIX=LOC-
    volumes:
      - ./.env:/app/.env:ro
    networks:
      - ollama-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - local-ollama
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Local Ollama instance (optional - for testing)
  local-ollama:
    image: ollama/ollama:latest
    container_name: local-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ollama-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ollama-network:
    driver: bridge

volumes:
  ollama-data:
    driver: local
