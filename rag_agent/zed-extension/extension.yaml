name: zed-rag-agent
displayName: Zed RAG Agent (local)
version: 0.1.0
description: Minimal Zed extension manifest for a local Retrieval-Augmented Generation (RAG) agent. Provides a command to call a local agent service and present allow/deny workflows. Install locally for development.
author: Your Name <you@example.com>
license: MIT
main: dist/extension.js

# Extension capabilities — adjust as Zed's platform evolves
capabilities:
  - ui
  - agentServer
  - commands

# Commands the extension exposes to the user
commands:
  - id: zed-rag-agent.ask
    title: "Zed RAG Agent: Ask/Refactor"
    description: "Send selected context or a prompt to the local RAG agent and show results."

# Activation events hint (Zed will load extension on command invocation)
activationEvents:
  - onCommand:zed-rag-agent.ask

# Optional configuration for the extension (users can override via environment)
configuration:
  properties:
    ragAgent.endpoint:
      type: string
      default: "http://127.0.0.1:7860"
      description: "Base URL of the local RAG agent service (e.g. http://127.0.0.1:7860)"
    ragAgent.apiToken:
      type: string
      default: ""
      description: "Optional local API token to authenticate against the agent service (if configured)"

# Simple metadata to help users install locally
repository:
  type: git
  url: "https://example.com/your/repo.git"

keywords:
  - zed
  - rag
  - agent
  - local
  - embeddings
  - search

# Notes:
# - This manifest is intentionally minimal and intended as a starting point for local development.
# - The extension's runtime entrypoint should exist at `dist/extension.js` (build step from src/).
# - Place the extension folder in Zed's local extensions directory to install for development:
#   - macOS: ~/Library/Application Support/Zed/extensions/
#   - Linux: $XDG_DATA_HOME/zed/extensions or ~/.local/share/zed/extensions
#   - Windows: %LOCALAPPDATA%\Zed\extensions
